<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot. High Vis</title>
    <style>
        /* --- RESET & BASICS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #050505; /* Deep Black */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
        }

        /* --- VIVID BACKGROUND GLOW --- */
        /* Made these brighter so the glass effect is obvious */
        .ambient-light {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            filter: blur(60px);
            opacity: 0.8; /* Increased opacity for visibility */
            animation: move 15s infinite alternate;
        }

        .blob-1 {
            top: 5%;
            left: 15%;
            width: 350px;
            height: 350px;
            background: linear-gradient(180deg, #4f46e5, #818cf8); /* Bright Indigo */
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }

        .blob-2 {
            bottom: 15%;
            right: 15%;
            width: 400px;
            height: 400px;
            background: linear-gradient(180deg, #c026d3, #db2777); /* Bright Fuchsia */
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation-duration: 20s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(30px, -30px) scale(1.1); }
        }

        /* --- THE HIGH-VIS GLASS CONTAINER --- */
        .app-container {
            position: relative;
            z-index: 10;
            width: 420px;
            max-height: 85vh;
            
            /* UPDATED: Much stronger glass effect */
            background: rgba(60, 60, 60, 0.4); /* Lighter grey base */
            background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.01) 100%);
            
            backdrop-filter: blur(40px); /* Heavy blur */
            -webkit-backdrop-filter: blur(40px);
            
            /* UPDATED: Stronger border to define edges */
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.5); /* Highlight on top */
            border-left: 1px solid rgba(255, 255, 255, 0.5); /* Highlight on left */
            
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            border-radius: 30px;
            padding: 35px;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .date {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- INPUT AREA --- */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            /* Lighter input background */
            background: rgba(0, 0, 0, 0.3); 
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 18px 20px;
            border-radius: 18px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        /* --- TODO LIST --- */
        ul {
            list-style: none;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Scrollbar */
        ul::-webkit-scrollbar {
            width: 6px;
        }
        ul::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.4);
            border-radius: 10px;
        }

        li {
            /* Lighter item background */
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
            animation: slideIn 0.3s ease forwards;
        }

        li:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateX(5px) scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- CHECKBOX STYLING --- */
        .dot-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #ffffff; /* Solid white border */
            margin-right: 15px;
            position: relative;
            transition: all 0.3s ease;
            flex-shrink: 0;
            box-shadow: 0 0 5px rgba(255,255,255,0.2);
        }

        /* Completed State */
        li.completed .dot-check {
            background: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            transform: scale(1.1);
        }

        li.completed span {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.4);
        }

        li span {
            flex-grow: 1;
            font-weight: 500;
            font-size: 1.05rem;
            letter-spacing: 0.3px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* Delete Button */
        .delete-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 1.4rem;
            transition: color 0.2s;
            padding: 0 5px;
        }

        .delete-btn:hover {
            color: #ff6b6b;
            transform: scale(1.1);
        }

        /* Footer Info */
        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }

    </style>
</head>
<body>

    <div class="ambient-light">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <header>
            <h1>Dot.</h1>
            <div class="date" id="currentDate"></div>
        </header>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Add a new task..." autocomplete="off">
        </div>

        <ul id="todoList">
            </ul>
        
        <div class="footer">
            Press Enter to add • Click to complete
        </div>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        const input = document.getElementById('todoInput');
        const list = document.getElementById('todoList');
        const dateElement = document.getElementById('currentDate');

        // 1. Set the Date
        const options = { weekday: 'long', month: 'short', day: 'numeric' };
        dateElement.innerText = new Date().toLocaleDateString('en-US', options);

        // 2. Load Tasks from LocalStorage on startup
        document.addEventListener('DOMContentLoaded', loadTodos);

        // 3. Add Task on Enter Key
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                addTodo(input.value);
                input.value = '';
            }
        });

        // Function to Add Todo
        function addTodo(text, completed = false) {
            const li = document.createElement('li');
            if (completed) li.classList.add('completed');

            // The 'Dot' checkbox visual
            const dot = document.createElement('div');
            dot.classList.add('dot-check');

            // The text span
            const span = document.createElement('span');
            span.innerText = text;

            // The delete button (X)
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '&times;';
            delBtn.classList.add('delete-btn');
            
            // Append elements
            li.appendChild(dot);
            li.appendChild(span);
            li.appendChild(delBtn);
            list.prepend(li); // Add to top of list

            // Toggle Complete Event
            li.addEventListener('click', (e) => {
                if(e.target !== delBtn) {
                    li.classList.toggle('completed');
                    saveTodos();
                }
            });

            // Delete Event
            delBtn.addEventListener('click', () => {
                li.style.opacity = '0';
                li.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    li.remove();
                    saveTodos();
                }, 300);
            });

            saveTodos();
        }

        // Function to Save to LocalStorage
        function saveTodos() {
            const todos = [];
            document.querySelectorAll('li').forEach(li => {
                todos.push({
                    text: li.querySelector('span').innerText,
                    completed: li.classList.contains('completed')
                });
            });
            localStorage.setItem('dotTodos', JSON.stringify(todos));
        }

        // Function to Load from LocalStorage
        function loadTodos() {
            const todos = JSON.parse(localStorage.getItem('dotTodos'));
            if (todos) {
                todos.reverse().forEach(todo => {
                    addTodo(todo.text, todo.completed);
                });
            }
        }
    </script>
</body>
</html>
